name: Tests

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Microsoft Edge for Playwright
        run: npx playwright install --with-deps msedge

      - name: Run all tests (unit + e2e)
        id: tests
        run: |
          set -o pipefail
          set +e
          npm run test:all 2>&1 | tee tests.log
          STATUS=$?

          # Strip ANSI escape codes so terminal-colored lines parse cleanly
          sed -E 's/\x1b\[[0-9;]*[A-Za-z]//g' tests.log > tests.clean

          # node --test spec-reporter summary: lines like "ℹ tests 68".
          # Match on field structure to be robust to the leading symbol.
          UNIT_TOTAL=$(awk 'NF>=2 && $(NF-1)=="tests" && $NF ~ /^[0-9]+$/ {print $NF; exit}' tests.clean)
          UNIT_PASS=$( awk 'NF>=2 && $(NF-1)=="pass"  && $NF ~ /^[0-9]+$/ {print $NF; exit}' tests.clean)
          UNIT_FAIL=$( awk 'NF>=2 && $(NF-1)=="fail"  && $NF ~ /^[0-9]+$/ {print $NF; exit}' tests.clean)

          # Playwright list reporter: "  17 passed (8.5s)" / "  2 failed"
          E2E_PASS=$(awk '{for(i=2;i<=NF;i++) if($i=="passed" && $(i-1) ~ /^[0-9]+$/) print $(i-1)}' tests.clean | tail -1)
          E2E_FAIL=$(awk '{for(i=2;i<=NF;i++) if($i=="failed" && $(i-1) ~ /^[0-9]+$/) print $(i-1)}' tests.clean | tail -1)

          # GH outputs
          {
            echo "unit_total=${UNIT_TOTAL:-0}"
            echo "unit_pass=${UNIT_PASS:-0}"
            echo "unit_fail=${UNIT_FAIL:-0}"
            echo "e2e_pass=${E2E_PASS:-0}"
            echo "e2e_fail=${E2E_FAIL:-0}"
          } >> "$GITHUB_OUTPUT"

          # Inline workflow annotations
          if [ -n "$UNIT_TOTAL" ]; then
            if [ "${UNIT_FAIL:-0}" -gt 0 ]; then
              echo "::error::Unit tests: $UNIT_FAIL of $UNIT_TOTAL failed"
            else
              echo "::notice::Unit tests: $UNIT_PASS / $UNIT_TOTAL passed"
            fi
          fi
          if [ -n "$E2E_PASS$E2E_FAIL" ]; then
            if [ "${E2E_FAIL:-0}" -gt 0 ]; then
              echo "::error::E2E tests: $E2E_FAIL failed (Playwright/MS Edge)"
            else
              echo "::notice::E2E tests: ${E2E_PASS:-0} passed (Playwright/MS Edge)"
            fi
          fi

          exit $STATUS

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Job summary
        if: always()
        run: |
          U_TOTAL='${{ steps.tests.outputs.unit_total }}'
          U_PASS='${{ steps.tests.outputs.unit_pass }}'
          U_FAIL='${{ steps.tests.outputs.unit_fail }}'
          E_PASS='${{ steps.tests.outputs.e2e_pass }}'
          E_FAIL='${{ steps.tests.outputs.e2e_fail }}'
          {
            echo "## Test results"
            echo ""
            echo "| Suite                           | Total | Passed | Failed |"
            echo "|---------------------------------|------:|-------:|-------:|"
            echo "| Unit (node --test)              | $U_TOTAL | $U_PASS | $U_FAIL |"
            echo "| E2E (Playwright on MS Edge)     | $((${E_PASS:-0} + ${E_FAIL:-0})) | ${E_PASS:-0} | ${E_FAIL:-0} |"
            echo ""
            echo "Combined via \`npm run test:all\`."
            echo "Playwright HTML report is attached as the \`playwright-report\` artifact."
          } >> "$GITHUB_STEP_SUMMARY"
