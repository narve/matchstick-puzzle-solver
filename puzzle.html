<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matchstick puzzle</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* puzzle-page-specific tweaks */
        header { font-family: sans-serif; font-size: 0.95em; margin-bottom: 1em; }
        header a { color: var(--text-dim); text-decoration: none; border-bottom: 1px dashed var(--border-strong); }
        header a:hover { color: var(--text); }
        h1#title { font-family: sans-serif; font-weight: normal; font-size: 1.4em; margin: 0.2em 0 0.8em; }
        #preview { min-height: 160px; }
        #invalid-message {
            font-family: sans-serif;
            border: 1px solid var(--border); border-left: 4px solid var(--err);
            background: #fff5f5; padding: 0.8em 1em;
            border-radius: 4px;
        }
        #anim-area { margin: 1em 0 0.5em; }
        #anim-area svg.equation-anim { overflow: visible; }
        #solve-btn { margin-top: 0.4em; padding: 0.4em 1.4em; }
        /* Phase 2 stub. `display: flex` would override the `hidden`
           attribute, so scope it to the not-hidden case. */
        #journey-nav:not([hidden]) {
            margin-top: 1.5em; font-family: sans-serif;
            display: flex; gap: 0.6em; align-items: center;
        }

        /* "Show me the rules!" disclosure at the bottom of the page. */
        #rules-toggle { margin-top: 2em; }
        #rules-toggle > summary {
            cursor: pointer; display: inline-block;
            font-family: sans-serif; font-size: 1em;
            color: var(--text-dim);
            text-decoration: underline;
            list-style: none;
        }
        #rules-toggle > summary::-webkit-details-marker { display: none; }
        #rules-toggle > summary:hover { color: var(--text); }
        #rules-toggle p { font-family: sans-serif; color: var(--text-dim); }
        #title .set-name {
            display: block; color: var(--text-muted);
            font-size: 0.7em; margin-bottom: 0.1em;
        }
        .status-note { font-family: sans-serif; color: var(--text-dim); }
        .status-note.ok { color: var(--ok); }
    </style>
</head>
<body>

<header>
    <a href="index.html">← Matchstick solver</a>
</header>

<h1 id="title">Puzzle</h1>

<div id="invalid-message" hidden></div>

<div id="puzzle-area" hidden>
    <div id="preview"></div>
    <div id="status"></div>

    <button id="solve-btn" class="chip" type="button">Reveal the solution</button>
    <div id="anim-area"></div>
</div>

<details id="rules-toggle" hidden>
    <summary>Show me the rules!</summary>
    <p>Legal moves under the <strong id="rules-ruleset-name"></strong> ruleset:</p>
    <div id="rules-table"></div>
</details>

<!-- Phase 2: journey navigation. Hidden until a puzzle-set is provided. -->
<nav id="journey-nav" hidden>
    <button id="prev-btn" class="chip" type="button">← Prev</button>
    <span id="journey-pos"></span>
    <button id="next-btn" class="chip" type="button">Next →</button>
</nav>

<script type="module" src="./src/puzzle-page.js"></script>

</body>
</html>
