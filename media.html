<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matchstick</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    body {
      font-family: Georgia, serif;
      padding: 2em;
      background: #faf7f0;
      color: #3a2e1a;
    }
    .matchstick {
      display: inline-block;
      vertical-align: middle;
      margin: 0 4px;
      filter: drop-shadow(1px 2px 2px rgba(0, 0, 0, 0.45));
    }
    table { border-collapse: collapse; margin-top: 1em; }
    th, td { border: 1px solid #c8b89a; padding: 1px; text-align: center; vertical-align: middle; }
    thead th { background: #f0e8d8; padding: 4px 8px; }
    .char-cell { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; align-items: center; }
  </style>
</head>
<body>

  <h2>The character set</h2>
  <p>Every digit and operator, built from matchsticks:</p>

  <div id="char-showcase" class="char-cell"></div>

  <h2>Character mutations</h2>
  <p>What each character can become when one matchstick is moved, added, or removed.</p>

  <table>
    <thead>
      <tr>
        <th>Character</th>
        <th>Move a match</th>
        <th>Add a match</th>
        <th>Remove a match</th>
      </tr>
    </thead>
    <tbody id="rules-body"></tbody>
  </table>

  <script type="module">
    import { getRuleSets } from './match.js';
    import { injectDefs, charSvg, VB_W, VB_H } from './matchstick-svg.js';

    const { legals, adds, subs, trans } = getRuleSets().find(r => r.name === "default");
    injectDefs(document.body);

    document.getElementById('char-showcase').innerHTML =
      legals.filter(c => c !== ' ').map(c =>
        charSvg(c, 96, 248) + (c === '7' ? '<div style="flex-basis:100%;height:0"></div>' : '')
      ).join('');

    const CHAR_SCALE = 1.1;
    const CW = Math.round(VB_W * CHAR_SCALE);
    const CH = Math.round(VB_H * CHAR_SCALE);

    const tbody = document.getElementById('rules-body');
    for (const c of legals) {
      if (c === ' ') continue;
      const tr = document.createElement('tr');

      const th = document.createElement('th');
      th.innerHTML = charSvg(c, CW, CH);
      tr.appendChild(th);

      for (const set of [trans[c], adds[c], subs[c]]) {
        const td = document.createElement('td');
        const div = document.createElement('div');
        div.className = 'char-cell';
        div.innerHTML = [...set].map(ch => charSvg(ch, CW, CH)).join('');
        td.appendChild(div);
        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }
  </script>

</body>
</html>
